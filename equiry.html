    <header>
        <div class="logo">
            <img src="images/idi deletes.PNG" alt="Idi Delites Logo">

        <h2>Customer Enquiry</h2>

    <!--Enquiry Form-->
    <section class="enquiry-container">
        <form id="enquiryForm">
            <input type="text" id="name" placeholder="Full Name">

            <textarea id="message" placeholder="Type Your Enquiry"></textarea>
            <button type="submit">Submit Enquiry</button>
